<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#7c3aed" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#6d28d9" media="(prefers-color-scheme: dark)" />
		<meta name="author" content="cmd-gen.com" />
		<meta property="fb:app_id" content="2306408559869119" />
		<!-- Google Analytics (GA4) — Consent Mode v2 -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-TX9J3RENDP"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('consent', 'default', {
				analytics_storage: 'denied'
			});
			gtag('js', new Date());
			gtag('config', 'G-TX9J3RENDP');
		</script>
		<script>
			// FOUC prevention: apply dark class before first paint
			(function() {
				var theme = localStorage.getItem('theme');
				if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
